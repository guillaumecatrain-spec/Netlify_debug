<!DOCTYPE html>
<!-- redeploy -->
<html lang='fr'>
<head>
<meta charset='UTF-8'>
<title>Stormglass Debug Version</title>
<style>
 body {font-family: Arial, sans-serif; background: #87CEFA; margin: 0; padding: 20px;}
 #debug {white-space: pre-wrap; font-size: 16px; background: #fff; padding: 20px; border-radius: 10px; margin-top: 20px;}
</style>
</head>
<body>
<h1>Stormglass Debug</h1>
<div id='debug'>Chargement…</div>
<script>
async function test() {
    let out = "=== TEST STORMGLASS (via Netlify Function) ===
";
    try {
        const r = await fetch('/.netlify/functions/stormglass');
        out += 'Status HTTP: ' + r.status + '

';
        const txt = await r.text();
        out += 'Réponse brute:
' + txt + '
';
    } catch (e) {
        out += 'ERREUR FETCH: ' + e + '
';
    }
    document.getElementById('debug').textContent = out;
}
test();
</script>
</body>
</html>
